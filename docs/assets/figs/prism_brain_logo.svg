<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <!-- Main gradient for hexagon and central elements -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>

    <!-- Blue gradient for left side -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>

    <!-- Purple gradient -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>

    <!-- Pink gradient -->
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>

    <!-- Orange gradient -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Strong glow filter -->
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shadow for text -->
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#0f172a" rx="20"/>

  <!-- Subtle background pattern - grid dots -->
  <g opacity="0.15">
    <circle cx="50" cy="50" r="1.5" fill="#60a5fa"/>
    <circle cx="100" cy="50" r="1.5" fill="#60a5fa"/>
    <circle cx="150" cy="50" r="1.5" fill="#60a5fa"/>
    <circle cx="200" cy="50" r="1.5" fill="#60a5fa"/>
    <circle cx="250" cy="50" r="1.5" fill="#60a5fa"/>
    <circle cx="300" cy="50" r="1.5" fill="#60a5fa"/>
    <circle cx="350" cy="50" r="1.5" fill="#60a5fa"/>
    <circle cx="400" cy="50" r="1.5" fill="#60a5fa"/>
    <circle cx="450" cy="50" r="1.5" fill="#60a5fa"/>
    <circle cx="500" cy="50" r="1.5" fill="#60a5fa"/>
    <circle cx="550" cy="50" r="1.5" fill="#60a5fa"/>

    <circle cx="50" cy="100" r="1.5" fill="#60a5fa"/>
    <circle cx="100" cy="100" r="1.5" fill="#60a5fa"/>
    <circle cx="150" cy="100" r="1.5" fill="#60a5fa"/>
    <circle cx="200" cy="100" r="1.5" fill="#60a5fa"/>
    <circle cx="250" cy="100" r="1.5" fill="#60a5fa"/>
    <circle cx="300" cy="100" r="1.5" fill="#60a5fa"/>
    <circle cx="350" cy="100" r="1.5" fill="#60a5fa"/>
    <circle cx="400" cy="100" r="1.5" fill="#60a5fa"/>
    <circle cx="450" cy="100" r="1.5" fill="#60a5fa"/>
    <circle cx="500" cy="100" r="1.5" fill="#60a5fa"/>
    <circle cx="550" cy="100" r="1.5" fill="#60a5fa"/>

    <circle cx="50" cy="150" r="1.5" fill="#60a5fa"/>
    <circle cx="100" cy="150" r="1.5" fill="#60a5fa"/>
    <circle cx="150" cy="150" r="1.5" fill="#60a5fa"/>
    <circle cx="200" cy="150" r="1.5" fill="#60a5fa"/>
    <circle cx="250" cy="150" r="1.5" fill="#60a5fa"/>
    <circle cx="300" cy="150" r="1.5" fill="#60a5fa"/>
    <circle cx="350" cy="150" r="1.5" fill="#60a5fa"/>
    <circle cx="400" cy="150" r="1.5" fill="#60a5fa"/>
    <circle cx="450" cy="150" r="1.5" fill="#60a5fa"/>
    <circle cx="500" cy="150" r="1.5" fill="#60a5fa"/>
    <circle cx="550" cy="150" r="1.5" fill="#60a5fa"/>

    <circle cx="50" cy="200" r="1.5" fill="#60a5fa"/>
    <circle cx="100" cy="200" r="1.5" fill="#60a5fa"/>
    <circle cx="150" cy="200" r="1.5" fill="#60a5fa"/>
    <circle cx="200" cy="200" r="1.5" fill="#60a5fa"/>
    <circle cx="250" cy="200" r="1.5" fill="#60a5fa"/>
    <circle cx="300" cy="200" r="1.5" fill="#60a5fa"/>
    <circle cx="350" cy="200" r="1.5" fill="#60a5fa"/>
    <circle cx="400" cy="200" r="1.5" fill="#60a5fa"/>
    <circle cx="450" cy="200" r="1.5" fill="#60a5fa"/>
    <circle cx="500" cy="200" r="1.5" fill="#60a5fa"/>
    <circle cx="550" cy="200" r="1.5" fill="#60a5fa"/>

    <circle cx="50" cy="250" r="1.5" fill="#60a5fa"/>
    <circle cx="100" cy="250" r="1.5" fill="#60a5fa"/>
    <circle cx="150" cy="250" r="1.5" fill="#60a5fa"/>
    <circle cx="200" cy="250" r="1.5" fill="#60a5fa"/>
    <circle cx="250" cy="250" r="1.5" fill="#60a5fa"/>
    <circle cx="300" cy="250" r="1.5" fill="#60a5fa"/>
    <circle cx="350" cy="250" r="1.5" fill="#60a5fa"/>
    <circle cx="400" cy="250" r="1.5" fill="#60a5fa"/>
    <circle cx="450" cy="250" r="1.5" fill="#60a5fa"/>
    <circle cx="500" cy="250" r="1.5" fill="#60a5fa"/>
    <circle cx="550" cy="250" r="1.5" fill="#60a5fa"/>

    <circle cx="50" cy="300" r="1.5" fill="#60a5fa"/>
    <circle cx="100" cy="300" r="1.5" fill="#60a5fa"/>
    <circle cx="150" cy="300" r="1.5" fill="#60a5fa"/>
    <circle cx="200" cy="300" r="1.5" fill="#60a5fa"/>
    <circle cx="250" cy="300" r="1.5" fill="#60a5fa"/>
    <circle cx="300" cy="300" r="1.5" fill="#60a5fa"/>
    <circle cx="350" cy="300" r="1.5" fill="#60a5fa"/>
    <circle cx="400" cy="300" r="1.5" fill="#60a5fa"/>
    <circle cx="450" cy="300" r="1.5" fill="#60a5fa"/>
    <circle cx="500" cy="300" r="1.5" fill="#60a5fa"/>
    <circle cx="550" cy="300" r="1.5" fill="#60a5fa"/>

    <circle cx="50" cy="350" r="1.5" fill="#60a5fa"/>
    <circle cx="100" cy="350" r="1.5" fill="#60a5fa"/>
    <circle cx="150" cy="350" r="1.5" fill="#60a5fa"/>
    <circle cx="200" cy="350" r="1.5" fill="#60a5fa"/>
    <circle cx="250" cy="350" r="1.5" fill="#60a5fa"/>
    <circle cx="300" cy="350" r="1.5" fill="#60a5fa"/>
    <circle cx="350" cy="350" r="1.5" fill="#60a5fa"/>
    <circle cx="400" cy="350" r="1.5" fill="#60a5fa"/>
    <circle cx="450" cy="350" r="1.5" fill="#60a5fa"/>
    <circle cx="500" cy="350" r="1.5" fill="#60a5fa"/>
    <circle cx="550" cy="350" r="1.5" fill="#60a5fa"/>
  </g>

  <!-- Logo Group - centered in left portion -->
  <g transform="translate(130, 200)">
    <!-- Outer glow ring -->
    <circle cx="0" cy="0" r="95" fill="none" stroke="url(#mainGrad)" stroke-width="1" opacity="0.2" filter="url(#strongGlow)"/>

    <!-- Hexagon brain outline -->
    <polygon points="0,-85 73.6,-42.5 73.6,42.5 0,85 -73.6,42.5 -73.6,-42.5" 
             fill="none" stroke="url(#mainGrad)" stroke-width="3" opacity="0.95" filter="url(#glow)"/>

    <!-- Inner hexagon for depth -->
    <polygon points="0,-75 65,-37.5 65,37.5 0,75 -65,37.5 -65,-37.5" 
             fill="none" stroke="url(#mainGrad)" stroke-width="1" opacity="0.3"/>

    <!-- Neural pathway lines -->
    <!-- Vertical center line -->
    <line x1="0" y1="-85" x2="0" y2="85" stroke="#3b82f6" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
    <!-- Diagonal lines -->
    <line x1="-73.6" y1="-42.5" x2="73.6" y2="42.5" stroke="#8b5cf6" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
    <line x1="73.6" y1="-42.5" x2="-73.6" y2="42.5" stroke="#ec4899" stroke-width="2" opacity="0.5" filter="url(#glow)"/>

    <!-- Secondary neural connections -->
    <line x1="0" y1="-85" x2="73.6" y2="42.5" stroke="#6366f1" stroke-width="1.5" opacity="0.35"/>
    <line x1="0" y1="-85" x2="-73.6" y2="42.5" stroke="#6366f1" stroke-width="1.5" opacity="0.35"/>
    <line x1="0" y1="85" x2="73.6" y2="-42.5" stroke="#f472b6" stroke-width="1.5" opacity="0.35"/>
    <line x1="0" y1="85" x2="-73.6" y2="-42.5" stroke="#f472b6" stroke-width="1.5" opacity="0.35"/>

    <!-- Central core node -->
    <circle cx="0" cy="0" r="18" fill="url(#mainGrad)" opacity="0.95" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="8" fill="#f8fafc" opacity="0.9"/>

    <!-- Peripheral nodes with different colors -->
    <!-- Top node (blue) -->
    <circle cx="0" cy="-65" r="9" fill="url(#blueGrad)" opacity="0.9" filter="url(#glow)"/>
    <circle cx="0" cy="-65" r="4" fill="#f8fafc" opacity="0.9"/>

    <!-- Top-right node (indigo) -->
    <circle cx="56.3" cy="-32.5" r="9" fill="url(#purpleGrad)" opacity="0.9" filter="url(#glow)"/>
    <circle cx="56.3" cy="-32.5" r="4" fill="#f8fafc" opacity="0.9"/>

    <!-- Bottom-right node (pink) -->
    <circle cx="56.3" cy="32.5" r="9" fill="url(#pinkGrad)" opacity="0.9" filter="url(#glow)"/>
    <circle cx="56.3" cy="32.5" r="4" fill="#f8fafc" opacity="0.9"/>

    <!-- Bottom node (orange) -->
    <circle cx="0" cy="65" r="9" fill="url(#orangeGrad)" opacity="0.9" filter="url(#glow)"/>
    <circle cx="0" cy="65" r="4" fill="#f8fafc" opacity="0.9"/>

    <!-- Bottom-left node (pink) -->
    <circle cx="-56.3" cy="32.5" r="9" fill="url(#pinkGrad)" opacity="0.9" filter="url(#glow)"/>
    <circle cx="-56.3" cy="32.5" r="4" fill="#f8fafc" opacity="0.9"/>

    <!-- Top-left node (indigo) -->
    <circle cx="-56.3" cy="-32.5" r="9" fill="url(#purpleGrad)" opacity="0.9" filter="url(#glow)"/>
    <circle cx="-56.3" cy="-32.5" r="4" fill="#f8fafc" opacity="0.9"/>

    <!-- Connection web - dashed orbital rings -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.4" stroke-dasharray="6,4" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="52" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.25" stroke-dasharray="4,8"/>
    <circle cx="0" cy="0" r="68" fill="none" stroke="#ec4899" stroke-width="0.8" opacity="0.15" stroke-dasharray="3,10"/>

    <!-- Small data flow particles -->
    <circle cx="0" cy="-35" r="2.5" fill="#60a5fa" opacity="0.9">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="25" cy="-20" r="2" fill="#a78bfa" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="120 0 0" to="480 0 0" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-25" cy="20" r="2" fill="#f472b6" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="240 0 0" to="600 0 0" dur="12s" repeatCount="indefinite"/>
    </circle>

    <!-- Connection lines from center to peripheral nodes -->
    <line x1="0" y1="0" x2="0" y2="-65" stroke="#60a5fa" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="0" x2="56.3" y2="-32.5" stroke="#a78bfa" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="0" x2="56.3" y2="32.5" stroke="#f472b6" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="0" x2="0" y2="65" stroke="#fbbf24" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="0" x2="-56.3" y2="32.5" stroke="#f472b6" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="0" x2="-56.3" y2="-32.5" stroke="#a78bfa" stroke-width="2" opacity="0.6"/>

    <!-- Inter-node connections (forming a hexagon web) -->
    <line x1="0" y1="-65" x2="56.3" y2="-32.5" stroke="#6366f1" stroke-width="1.2" opacity="0.4"/>
    <line x1="56.3" y1="-32.5" x2="56.3" y2="32.5" stroke="#8b5cf6" stroke-width="1.2" opacity="0.4"/>
    <line x1="56.3" y1="32.5" x2="0" y2="65" stroke="#ec4899" stroke-width="1.2" opacity="0.4"/>
    <line x1="0" y1="65" x2="-56.3" y2="32.5" stroke="#ec4899" stroke-width="1.2" opacity="0.4"/>
    <line x1="-56.3" y1="32.5" x2="-56.3" y2="-32.5" stroke="#8b5cf6" stroke-width="1.2" opacity="0.4"/>
    <line x1="-56.3" y1="-32.5" x2="0" y2="-65" stroke="#6366f1" stroke-width="1.2" opacity="0.4"/>
  </g>

  <!-- Organization Name Text - Right side -->
  <g transform="translate(280, 155)">
    <!-- Main title: Multimodal Vision AI -->
    <text x="0" y="0" font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, sans-serif" 
          font-size="32" font-weight="800" fill="url(#mainGrad)" filter="url(#textShadow)" letter-spacing="-0.02em">
      Multimodal
    </text>
    <text x="0" y="42" font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, sans-serif" 
          font-size="32" font-weight="800" fill="url(#mainGrad)" filter="url(#textShadow)" letter-spacing="-0.02em">
      Vision AI
    </text>

    <!-- Chinese subtitle -->
    <text x="0" y="82" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="16" font-weight="500" fill="#94a3b8" letter-spacing="0.08em">
      多模态视觉人工智能实验室
    </text>

    <!-- Decorative line -->
    <line x1="0" y1="100" x2="200" y2="100" stroke="url(#mainGrad)" stroke-width="2" opacity="0.6"/>

    <!-- Tagline -->
    <text x="0" y="128" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', monospace" 
          font-size="11" font-weight="400" fill="#64748b" letter-spacing="0.1em">
      SEE THE WORLD · UNDERSTAND THE FUTURE
    </text>

    <!-- Small icons representing multimodal -->
    <g transform="translate(0, 148)">
      <!-- Document icon -->
      <rect x="0" y="0" width="14" height="18" rx="2" fill="none" stroke="#60a5fa" stroke-width="1.2" opacity="0.7"/>
      <line x1="3" y1="5" x2="11" y2="5" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
      <line x1="3" y1="9" x2="11" y2="9" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
      <line x1="3" y1="13" x2="8" y2="13" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>

      <!-- Image icon -->
      <rect x="22" y="0" width="18" height="14" rx="2" fill="none" stroke="#a78bfa" stroke-width="1.2" opacity="0.7"/>
      <circle cx="28" cy="6" r="2" fill="#a78bfa" opacity="0.5"/>
      <polyline points="24,12 29,7 33,11 35,9" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>

      <!-- Audio/Sound icon -->
      <path d="M52,4 L52,12 M48,6 L48,10 M56,2 L56,14" fill="none" stroke="#f472b6" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
      <path d="M60,5 Q63,8 60,11" fill="none" stroke="#f472b6" stroke-width="1.2" opacity="0.5"/>

      <!-- Video icon -->
      <rect x="68" y="1" width="16" height="12" rx="2" fill="none" stroke="#fbbf24" stroke-width="1.2" opacity="0.7"/>
      <polygon points="78,5 84,8 78,11" fill="#fbbf24" opacity="0.5"/>

      <!-- Label -->
      <text x="95" y="11" font-family="'JetBrains Mono', monospace" font-size="9" fill="#475569" letter-spacing="0.05em">TEXT · IMAGE · AUDIO · VIDEO</text>
    </g>
  </g>

  <!-- Bottom decorative element -->
  <g transform="translate(300, 360)">
    <text x="0" y="0" text-anchor="middle" font-family="'JetBrains Mono', monospace" 
          font-size="10" fill="#334155" letter-spacing="0.15em">
      MULTIMODAL-VISION-AI · GITHUB ORGANIZATION
    </text>
  </g>
</svg>